# pool:
#   name: XM Cloud
#   demands:
#     - Agent.Name -equals ubuntu

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: UseNode@1
  displayName: 'Install Node 22.x'
  inputs:
    version: '22.x'

- task: Npm@1
  displayName: Vercel CLI
  inputs:
    command: 'custom'
    customCommand: 'i -g vercel@latest'

- task: PowerShell@2
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/localDeployDomain.ps1'
    arguments: '-alias $env:DEPLOYMENT_ALIAS -projectName $env:PROJECT_NAME -deploymentType $env:DEPLOYMENT_TYPE'
    pwsh: true
    workingDirectory: '$(System.DefaultWorkingDirectory)'
